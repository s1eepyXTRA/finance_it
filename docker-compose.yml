services:
  greenplum:
    build: ./docker/greenplum
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${GP_USER:-gpadmin}
      - POSTGRES_PASSWORD=${GP_PASSWORD:-tracker123}
      - POSTGRES_DB=${GP_DB:-tracker}
    volumes:
      - gp_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gpadmin -d tracker"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  gp_data:
